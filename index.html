<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event-App Kurpark Bad Mergentheim</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-blue: #003366;
            --accent-blue: #226699;
            --white: #ffffff;
        }
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .map-logo {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 8px; border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); max-width: 140px;
        }

        .filter-panel {
            position: absolute; top: 100px; left: 15px; z-index: 1000;
            display: flex; flex-direction: column; gap: 5px;
        }

        .filter-btn {
            background: white; border: 1px solid var(--primary-blue);
            padding: 10px 15px; cursor: pointer; border-radius: 4px;
            font-weight: bold; color: var(--primary-blue); text-align: left;
        }

        .filter-btn.active { background: var(--primary-blue); color: white; }

        .info-panel {
            position: absolute; bottom: 25px; left: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 4px;
            border-top: 4px solid var(--primary-blue);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 260px;
        }

        .btn-kbm {
            width: 100%; margin-top: 8px; padding: 12px;
            border: 1px solid var(--primary-blue); background: white;
            color: var(--primary-blue); font-weight: bold; cursor: pointer;
        }
        .btn-kbm:hover { background: var(--primary-blue); color: white; }
        
        .popup-img { width: 100%; border-radius: 4px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="map-logo">
        <img src="https://www.bad-mergentheim.de/layout/img/logo.png" alt="Logo" style="width:100%;">
    </div>

    <div class="filter-panel">
        <button class="filter-btn active" onclick="updateFilter('all', this)">Alle anzeigen</button>
        <button class="filter-btn" onclick="updateFilter('stage', this)">🎭 Bühnen</button>
        <button class="filter-btn" onclick="updateFilter('food', this)">🍔 Gastronomie</button>
        <button class="filter-btn" onclick="updateFilter('service', this)">🚻 Service & WCs</button>
        <button class="filter-btn" onclick="updateFilter('parking', this)">🅿️ Parken</button>
    </div>

    <div class="info-panel">
        <h3 style="margin:0 0 10px 0; color:var(--primary-blue);">Kurpark Navigator</h3>
        <button class="btn-kbm" onclick="locateUser()">📍 Mein Standort</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false}).setView([49.4942, 9.7825], 18);
        L.control.zoom({position: 'topright'}).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // DEINE DATEN AUS DER GOOGLE KARTE
        const places = [
            // BÜHNEN
            { type: 'stage', pos: [49.4952, 9.7825], title: "Große Bühne (Wandelhalle)", img: "https://www.bad-mergentheim.de/de/tourismus/kurpark/wandelhalle-id_164/images/wandelhalle.jpg" },
            { type: 'stage', pos: [49.4940, 9.7830], title: "Musikmuschel", img: "" },
            { type: 'stage', pos: [49.4958, 9.7845], title: "Klanggarten Bühne", img: "" },
            
            // GASTRO
            { type: 'food', pos: [49.4948, 9.7815], title: "Café Haus des Gastes", img: "https://www.bad-mergentheim.de/de/tourismus/kurpark/haus-des-gastes-id_163/images/haus_des_gastes.jpg" },
            { type: 'food', pos: [49.4935, 9.7840], title: "Bistro am Gradierbau", img: "" },
            { type: 'food', pos: [49.4945, 9.7820], title: "Weinstand", img: "" },

            // SERVICE
            { type: 'service', pos: [49.4949, 9.7812], title: "WC Haus des Gastes", img: "" },
            { type: 'service', pos: [49.4938, 9.7838], title: "WC Gradierbau", img: "" },
            { type: 'service', pos: [49.4955, 9.7828], title: "Erste Hilfe / Info", img: "" },

            // PARKEN
            { type: 'parking', pos: [49.4930, 9.7810], title: "Parkplatz P1", img: "" },
            { type: 'parking', pos: [49.4965, 9.7850], title: "Parkplatz P2", img: "" }
        ];

        let currentMarkers = [];

        function updateFilter(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            currentMarkers.forEach(m => map.removeLayer(m));
            currentMarkers = [];

            places.forEach(p => {
                if (type === 'all' || p.type === type) {
                    let content = `<div style="min-width:150px;"><b>${p.title}</b>`;
                    if(p.img) content = `<img src="${p.img}" class="popup-img">` + content;
                    content += `</div>`;
                    const m = L.marker(p.pos).addTo(map).bindPopup(content);
                    currentMarkers.push(m);
                }
            });
        }

        function locateUser() { map.locate({setView: true, maxZoom: 18}); }
        updateFilter('all', document.querySelector('.filter-btn'));
    </script>
</body>
</html><!DOCTYPE html>
