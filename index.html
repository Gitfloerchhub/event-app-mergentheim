<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurpark Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --wm-blue: #007aff;
            --wm-green: #7dc04c;
            --wm-orange: #f5a623;
            --wm-gray: #8e8e93;
            --bg-white: #ffffff;
        }

        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f0f2; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .card {
            background: var(--bg-white);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            pointer-events: auto;
            width: 280px;
        }

        .logo-card { display: flex; align-items: center; gap: 10px; }
        .logo-card img { height: 40px; }

        .filter-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .filter-btn {
            background: #f2f2f7;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #3a3a3c;
            cursor: pointer;
            transition: 0.2s;
        }
        .filter-btn.active { background: var(--wm-blue); color: white; }

        .wm-marker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .btn-main {
            width: 100%;
            background: var(--wm-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-container">
        <div class="card logo-card">
            <img src="https://www.bad-mergentheim.de/layout/img/logo.png" alt="Logo">
            <span style="font-weight: 800; font-size: 16px; color: #1c1c1e;">Kurpark App</span>
        </div>

        <div class="card">
            <div style="font-size: 12px; color: #8e8e93; margin-bottom: 10px; text-transform: uppercase; font-weight: bold;">Kategorien</div>
            <div class="filter-group">
                <button class="filter-btn active" onclick="updateFilter('all', this)">Alle</button>
                <button class="filter-btn" onclick="updateFilter('stage', this)">🎭 Bühnen</button>
                <button class="filter-btn" onclick="updateFilter('food', this)">🍔 Gastro</button>
                <button class="filter-btn" onclick="updateFilter('service', this)">🚻 Service</button>
            </div>
            <button class="btn-main" onclick="locateUser()">📍 Meinen Standort</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false}).setView([49.4945, 9.7830], 17);
        L.control.zoom({position: 'topright'}).addTo(map);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const places = [
            // BÜHNEN (Präzise Referenzpunkte)
            { type: 'stage', color: '#007aff', pos: [49.49360, 9.78472], title: "Musikpavillon", icon: "🎺" },
            { type: 'stage', color: '#007aff', pos: [49.49479, 9.78164], title: "Bühne Musikpavillon", icon: "🎭" },
            { type: 'stage', color: '#007aff', pos: [49.49492, 9.78106], title: "Bühne Klanggarten", icon: "🎵" },
            
            // GASTRO (Korrigiert)
            { type: 'food', color: '#f5a623', pos: [49.49475, 9.78165], title: "Café Haus des Gastes", icon: "☕" },
            { type: 'food', color: '#f5a623', pos: [49.49360, 9.78420], title: "Bistro am Gradierbau", icon: "🍔" },
            { type: 'food', color: '#f5a623', pos: [49.49450, 9.78200], title: "Weinstand", icon: "🍷" },
            
            // SERVICE (Korrigiert)
            { type: 'service', color: '#7dc04c', pos: [49.49490, 9.78130], title: "WC Haus des Gastes", icon: "🚻" },
            { type: 'service', color: '#7dc04c', pos: [49.49380, 9.78390], title: "WC am Gradierbau", icon: "🚻" },
            { type: 'service', color: '#7dc04c', pos: [49.49560, 9.78290], title: "Erste Hilfe & Info", icon: "ℹ️" }
        ];

        let currentMarkers = [];

        function updateFilter(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            currentMarkers.forEach(m => map.removeLayer(m));
            currentMarkers = [];

            places.forEach(p => {
                if (type === 'all' || p.type === type) {
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="wm-marker" style="background:${p.color}">${p.icon}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });

                    const m = L.marker(p.pos, {icon: icon}).addTo(map).bindPopup(`<b>${p.title}</b>`);
                    currentMarkers.push(m);
                }
            });
        }

        function locateUser() { map.locate({setView: true, maxZoom: 18}); }
        updateFilter('all', document.querySelector('.filter-btn'));
    </script>
</body>
</html><!DOCTYPE html>
