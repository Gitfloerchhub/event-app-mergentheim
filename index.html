<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurpark Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --wm-blue: #007aff;
            --wm-green: #7dc04c;
            --wm-orange: #f5a623;
            --wm-gray: #8e8e93;
            --bg-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f0f2;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
            width: 290px;
        }

        .card {
            background: var(--bg-white);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            pointer-events: auto;
        }

        .logo-card {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-card img {
            height: 40px;
            width: auto;
        }

        .filter-title {
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .filter-btn {
            background: #f2f2f7;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #3a3a3c;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: var(--wm-blue);
            color: white;
        }

        .btn-main {
            width: 100%;
            background: var(--wm-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-main:hover {
            background: #005ec4;
        }

        .wm-marker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
        }

        .leaflet-popup-content {
            margin: 12px 16px;
            font-size: 14px;
            line-height: 1.4;
        }

        .popup-title {
            font-weight: 700;
            color: #1c1c1e;
            margin-bottom: 4px;
        }

        .popup-meta {
            color: #6e6e73;
            font-size: 12px;
        }

        .hint {
            margin-top: 8px;
            font-size: 12px;
            color: #6e6e73;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-container">
        <div class="card logo-card">
            <img src="https://www.bad-mergentheim.de/layout/img/logo.png" alt="Bad Mergentheim Logo">
            <span style="font-weight: 800; font-size: 16px; color: #1c1c1e; line-height: 1.2;">Kurpark App</span>
        </div>

        <div class="card">
            <div class="filter-title">Kategorien</div>
            <div class="filter-group">
                <button class="filter-btn active" onclick="updateFilter('all', this)">Alle</button>
                <button class="filter-btn" onclick="updateFilter('stage', this)">🎭 Bühnen</button>
                <button class="filter-btn" onclick="updateFilter('food', this)">🍔 Gastro</button>
                <button class="filter-btn" onclick="updateFilter('service', this)">🚻 Service</button>
            </div>
            <button class="btn-main" onclick="locateUser()">📍 Meinen Standort</button>
            <div class="hint">Wheelmap-ähnliche Ansicht mit farbigen Markern</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([49.4946, 9.7825], 18);
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO'
        }).addTo(map);

        const places = [
            // Bühnen
            { type: 'stage', color: '#007aff', pos: [49.49360, 9.78472], title: 'Musikpavillon', icon: '🎺', meta: '49.49360, 9.78472' },
            { type: 'stage', color: '#007aff', pos: [49.49479, 9.78164], title: 'Bühne am Haus des Gastes', icon: '🎭', meta: '49.49479, 9.78164' },
            { type: 'stage', color: '#007aff', pos: [49.49492, 9.78106], title: 'Bühne Klanggarten', icon: '🎵', meta: '49.49492, 9.78106' },

            // Gastro
            { type: 'food', color: '#f5a623', pos: [49.49472, 9.78178], title: 'Café Haus des Gastes', icon: '☕', meta: 'Gastronomie' },
            { type: 'food', color: '#f5a623', pos: [49.49372, 9.78410], title: 'Bistro am Gradierbau', icon: '🍔', meta: 'Gastronomie' },
            { type: 'food', color: '#f5a623', pos: [49.49448, 9.78220], title: 'Weinstand', icon: '🍷', meta: 'Gastronomie' },

            // Service
            { type: 'service', color: '#7dc04c', pos: [49.49488, 9.78125], title: 'WC Haus des Gastes', icon: '🚻', meta: 'Service' },
            { type: 'service', color: '#7dc04c', pos: [49.49386, 9.78388], title: 'WC am Gradierbau', icon: '🚻', meta: 'Service' },
            { type: 'service', color: '#7dc04c', pos: [49.49555, 9.78290], title: 'Erste Hilfe & Info', icon: 'ℹ️', meta: 'Service' }
        ];

        let currentMarkers = [];

        function createPopup(p) {
            return `
                <div class="popup-title">${p.title}</div>
                <div class="popup-meta">${p.meta}</div>
                <div style="margin-top:6px; font-size: 20px;">${p.icon}</div>
            `;
        }

        function updateFilter(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            currentMarkers.forEach(m => map.removeLayer(m));
            currentMarkers = [];

            places.forEach(p => {
                if (type === 'all' || p.type === type) {
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="wm-marker" style="background:${p.color}">${p.icon}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });

                    const marker = L.marker(p.pos, { icon }).addTo(map).bindPopup(createPopup(p));
                    currentMarkers.push(marker);
                }
            });
        }

        function locateUser() {
            map.locate({ setView: true, maxZoom: 18 });
        }

        map.on('locationfound', function(e) {
            L.circle(e.latlng, { radius: e.accuracy / 2, color: '#007aff' }).addTo(map);
            L.circleMarker(e.latlng, {
                radius: 8,
                color: 'white',
                fillColor: '#007aff',
                fillOpacity: 1,
                weight: 2
            }).addTo(map).bindPopup('Du bist hier').openPopup();
        });

        map.on('locationerror', function(e) {
            alert('Standort konnte nicht gefunden werden: ' + e.message);
        });

        updateFilter('all', document.querySelector('.filter-btn'));
    </script>
</body>

            { type: 'service', color: '#7dc04c', pos: [49.49380, 9.78390], title: "WC am Gradierbau", icon: "🚻" }
        ];

        let currentMarkers = [];

        function updateFilter(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            currentMarkers.forEach(m => map.removeLayer(m));
            currentMarkers = [];

            places.forEach(p => {
                if (type === 'all' || p.type === type) {
                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="wm-marker" style="background:${p.color}">${p.icon}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });

                    const m = L.marker(p.pos, {icon: icon}).addTo(map).bindPopup(`<b>${p.title}</b>`);
                    currentMarkers.push(m);
                }
            });
        }

        function locateUser() { map.locate({setView: true, maxZoom: 18}); }
        updateFilter('all', document.querySelector('.filter-btn'));
    </script>
</body>
</html>
